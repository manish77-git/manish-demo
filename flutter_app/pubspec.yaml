name: draw_battle
description: "DrawBattle — Cross-platform AI drawing challenge app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.3.0

  # State Management
  provider: ^6.1.2

  # Networking
  http: ^1.2.2
  http_parser: ^4.0.2
  socket_io_client: ^2.0.3+1
  shared_preferences: ^2.2.3
  lucide_icons_flutter: any

  # UI
  google_fonts: ^6.2.1

  # Utilities
  uuid: ^4.5.1
  path: ^1.9.0
  image: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
